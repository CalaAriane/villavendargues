  </div> <script>

        checkoutTitle: " 🛫 Départ (Avant 10h)",

        checkoutList: "<li><span class='icon'>▪</span> <strong>Linge :</strong> Rassembler l'ensemble au pied de chaque lit.</li><li><span class='icon'>▪</span> <strong>Serviettes :</strong> À déposer directement dans la baignoire.</li><li><span class='icon'>▪</span> <strong>Poubelles :</strong> Vider dans les bacs extérieurs. Mettre impérativement les bouteilles en verre usagées dans le container qui se trouve derrière le camion Pizza.</li><li><span class='icon'>▪</span> <strong>Barbecue :</strong> Le barbecue doit être laissé propre et la barquette qui est sous le barbecue doit être jetée à la poubelle.</li><li><span class='icon'>▪</span> <strong>Jacuzzi :</strong> Remettre la température au minimum.</li><li><span class='icon'>▪</span> <strong>Sécurité :</strong> Veiller à fermer les volets, la porte ainsi que le portail.</li>",
        shoppingTitle: "Alimentation & Marchés",
        activitiesTitle: "Recommandations & Sorties",
        bentoRulesTitle: " ⚠ Consignes Importantes",
        bentoRulesDesc: "La maison est équipée d'une fosse septique : veuillez jeter UNIQUEMENT du papier toilette dedans. De plus, la maison est strictement non fumeur.",
        bentoRulesWind: " 💨 Attention au vent : Remontez toujours les stores extérieurs et sanglez les parasols le soir et avant de quitter la maison.",

        manualTitle: " 📖 Mode d'emploi de la Villa",
        manualList: "<li><span class='icon'> 🔑</span> <strong>Clés :</strong> 2 jeux avec télécommandes (porte principale et garage).</li><li><span class='icon'> 📶</span> <strong>Wi-Fi :</strong> Code sur la box entre les canapés (ou scannez le QR code).</li><li><span class='icon'> 🪟</span> <strong>Volets & Store :</strong> Bouton 'centralisation' sous l'interphone pour les volets du salon (chambres individuelles). Télécommande du store à gauche de la baie vitrée (à rentrer la nuit, en cas d'absence, ou s'il y a du vent). Pensez aussi à sangler les parasols.</li><li><span class='icon'> 🏊</span> <strong>Piscine & Jeux :</strong> Interrupteur lumière piscine au même endroit. Raquettes, fléchettes et serviettes de piscine dans le pool house.</li><li><span class='icon'> 🚲</span> <strong>Garage :</strong> Vous y trouverez vélos, boules de pétanque et matériel de nettoyage.</li><li><span class='icon'> 🥩</span> <strong>Barbecue :</strong> Au gaz (bouteille de rechange dispo, remplaçable au Carrefour Market du Crès).</li><li><span class='icon'> 🫧</span> <strong>Jacuzzi :</strong> Notice dans le livre noir (bibliothèque). Rincez vos pieds, n'entrez pas avec crème ou huile, et remettez la couverture après usage.</li><li><span class='icon'> 🔥</span> <strong>Cheminée :</strong> Actuellement hors d'usage.</li><li><span class='icon'> 🍽</span> <strong>Usage :</strong> Villa destinée à la location, n'hésitez pas à utiliser ce qui se trouve dans les placards !</li>",
      },
    };

    let dbPlaces = [];
    let currentLang = 'fr';

    function changeLanguage(lang) {
      currentLang = lang;
      document.documentElement.setAttribute('lang', lang);
      localStorage.setItem('villa-lang', lang);

      const t = i18nGlobal[lang];
      if (!t) return;

      document.querySelectorAll('.i18n').forEach(el => {
        const key = el.getAttribute('data-key');
        if (t[key]) el.innerHTML = t[key];
      });

      // Vérification de sécurité pour éviter le plantage du bouton de thème
      const themeBtn = document.getElementById('themeBtn');
      if (themeBtn) {
        const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
        themeBtn.innerText = "🌓"; 
      }

      const checkoutContainer = document.getElementById('checkout-list-element');
      if (checkoutContainer) {
        checkoutContainer.innerHTML = t.checkoutList;
      }
      const checkinContainer = document.querySelector('.list-clean[data-key="checkinList"]');
      if (checkinContainer) {
        checkinContainer.innerHTML = t.checkinList;
      }

      renderDynamicCards();
    }

    function renderDynamicCards() {
      const containers = {
        artisans: document.getElementById('container-artisans'),
        marches: document.getElementById('container-marches'),
        restos: document.getElementById('container-restos'),
        domaines: document.getElementById('container-domaines'),
        visites: document.getElementById('container-visites'),
        loisirs: document.getElementById('container-loisirs')
      };

      Object.values(containers).forEach(c => { if(c) c.innerHTML = ''; });

      dbPlaces.forEach(item => {
        const txt = item[currentLang] || item;
        const btnText = i18nGlobal[currentLang] ? i18nGlobal[currentLang].btnLink : "Découvrir";
        const html = `
          <div class="place-card scroll-item">
            <div class="item-image" style="background-image: url('${item.img}');"></div>
            <div class="item-content">
              <div>
                <h4>${txt.t}</h4>
                <p style="margin-top: 6px; margin-bottom: 10px;">${txt.d}</p>
                <div class="item-badge">
                  <strong>${txt.bt} :</strong> ${txt.bd}
                </div>
              </div>
              <a href="${item.link}" target="_blank" class="btn minimal">${btnText}</a>
            </div>
          </div>
        `;
        if (containers[item.section]) containers[item.section].innerHTML += html;
      });

      scrollRevealEngine();
    }

    function toggleTheme() {
      const html = document.documentElement;
      const newTheme = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-theme', newTheme);
      localStorage.setItem('villa-theme-pref', newTheme);
      changeLanguage(currentLang);
    }

    function switchPage(pageId) {
      document.querySelectorAll('.page-view').forEach(v => v.classList.remove('active'));
      document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
      
      const targetPage = document.getElementById(`page-${pageId}`);
      const targetNav = document.getElementById(`nav-${pageId}`);
      if(targetPage) targetPage.classList.add('active');
      if(targetNav) targetNav.classList.add('active');
      
      window.scrollTo({ top: 0, behavior: 'smooth' });
      setTimeout(scrollRevealEngine, 50);
    }

    function scrollRevealEngine() {
      const items = document.querySelectorAll('.reveal');
      items.forEach(el => {
        if (el.getBoundingClientRect().top < window.innerHeight - 50) el.classList.add('active');
      });
    }

    // 🌟 SÉCURISATION DU CHARGEMENT SANS SÉLECTEUR DE LANGUE DE HAUT DE PAGE
    document.addEventListener('DOMContentLoaded', async () => {
      document.documentElement.setAttribute('data-theme', localStorage.getItem('villa-theme-pref') || 'light');
      
      // Récupération sécurisée de la langue sauvegardée sans appeler .value sur un élément inexistant
      const savedLang = localStorage.getItem('villa-lang') || 'fr';

      try {
        const response = await fetch('data.json');
        const data = await response.json();
        if (data && data.lieux) {
          dbPlaces = data.lieux;
        }
      } catch (e) {
        console.error("Erreur de chargement des données", e);
      }

      changeLanguage(savedLang);
      window.addEventListener('scroll', scrollRevealEngine);

      if (window.netlifyIdentity) {
        window.netlifyIdentity.on("init", user => {
          if (!user) {
            window.netlifyIdentity.on("login", () => {
              document.location.href = "/admin/";
            });
          }
        });
      }
    });
  </script>

  <script type="text/javascript">

      new google.translate.TranslateElement({
        pageLanguage: 'fr',
        includedLanguages: 'fr,en,de,nl', 
        layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
        autoDisplay: false
      }, 'google_translate_element');
    }
  </script>
