backend:
  name: git-gateway
  branch: main

locale: fr

# Le fichier unique de votre base de données
media_folder: "images"
public_folder: "images"

# Désactive l'aperçu à droite
show_preview_links: false
cms_manual_init: false

collections:
  - name: "donnees"
    label: "📱 Gestion des Bulles du Site"
    delete: false # Empêche de supprimer par erreur le fichier entier data.json
    files:
      - label: "Toutes les adresses"
        name: "adresses"
        file: "data.json" # Modifie directement le bon fichier
        fields:
          - label: "Liste des adresses"
            name: "lieux"
            widget: "list"
            summary: "{{fields.fr.t}} [{{fields.section}}]" # Affiche le nom français et la catégorie dans la liste globale
            fields:
              - label: "Catégorie / Rubrique"
                name: "section"
                widget: "select"
                options:
                  - {label: "🛒 Artisans & Commerces", value: "artisans"}
                  - {label: "🧺 Les Marchés Locaux", value: "marches"}
                  - {label: "🍹 Restaurants & Plages", value: "restos"}
                  - {label: "🍇 Vignobles & Domaines", value: "domaines"}
                  - {label: "🏰 Patrimoine & Nature", value: "visites"}
                  - {label: "🎯 Loisirs & Famille", value: "loisirs"}
              
              - {label: "Photo (Télécharger depuis l'ordi/téléphone)", name: "img", widget: "image"}
              - {label: "Lien Google Maps ou Site Web", name: "link", widget: "string"}
              
              # Bloc de saisie en Français
              - label: "🇫🇷 TEXTES EN FRANÇAIS"
                name: "fr"
                widget: "object"
                fields:
                  - {label: "Nom du lieu", name: "t", widget: "string"}
                  - {label: "Description principale", name: "d", widget: "text"}
                  - {label: "Titre du badge (ex: Incontournable)", name: "bt", widget: "string", required: false}
                  - {label: "Texte de l'astuce (dans le badge)", name: "bd", widget: "text", required: false}

              # Bloc Anglais masqué/simplifié mais requis pour le code du site
              - label: "🇬🇧 VERSION ANGLAISE (Recopiez le français ou traduisez si besoin)"
                name: "en"
                widget: "object"
                fields:
                  - {label: "Nom du lieu (EN)", name: "t", widget: "string"}
                  - {label: "Description (EN)", name: "d", widget: "text"}
                  - {label: "Titre badge (EN)", name: "bt", widget: "string", required: false}
                  - {label: "Texte astuce (EN)", name: "bd", widget: "text", required: false}