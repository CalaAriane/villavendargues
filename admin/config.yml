# Configuration de la connexion
backend:
  name: git-gateway
  branch: main # ⚠️ CHANGEZ PAR "master" SI VOTRE BRANCHE GITHUB S'APPELLE MASTER

# Force l'interface de Decap CMS en Français (Boutons, messages, etc.)
locale: fr

# Gestion des images
media_folder: "images"
public_folder: "images"

# Désactivation complète de l'aperçu dynamique à droite (Render Preview)
show_preview_links: false
cms_manual_init: false

# Configuration des catégories de gestion
collections:
  - name: "artisans"
    label: "🛒 Artisans & Commerces"
    label_singular: "un artisan / commerce"
    folder: "data/artisans" # Organise par dossiers pour séparer proprement
    create: true
    delete: true
    fields:
      - {label: "Nom du lieu", name: "t", widget: "string"}
      - {label: "Photo (Télécharger depuis l'ordi/téléphone)", name: "img", widget: "image"}
      - {label: "Lien Google Maps ou Site Web", name: "link", widget: "string"}
      - {label: "Description principale", name: "d", widget: "text"}
      - {label: "Titre du badge (ex: Incontournable)", name: "bt", widget: "string", required: false}
      - {label: "Texte de l'astuce (dans le badge)", name: "bd", widget: "text", required: false}

  - name: "marches"
    label: "🧺 Les Marchés Locaux"
    label_singular: "un marché"
    folder: "data/marches"
    create: true
