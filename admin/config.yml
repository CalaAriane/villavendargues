backend:
  name: git-gateway
  branch: main

locale: fr

media_folder: "images"
public_folder: "images"

# Désactive l'aperçu natif
show_preview_links: false
cms_manual_init: false

collections:
  - name: "donnees"
    label: "📱 Gestion des Bulles du Site"
    delete: false
    files:
      - label: "Toutes les adresses"
        name: "adresses"
        file: "data.json"
        fields:
          - label: "Liste des adresses"
            name: "lieux"
            widget: "list"
            summary: "{{fields.fr.t}} [{{fields.section}}]"
            fields:
              - label: "Catégorie / Rubrique"
                name: "section"
                widget: "select"
                options:
                  - {label: "🛒 Artisans & Commerces", value: "artisans"}
                  - {label: "🧺 Les Marchés Locaux", value: "marches"}
                  - {label: "🍹 Restaurants & Plages", value: "restos"}
                  - {label: "🍇 Vignobles & Domaines", value: "domaines"}
                  - {label: "🏰 Patrimoine & Nature", value: "visites"}
                  - {label: "🎯 Loisirs & Famille", value: "loisirs"}
              
              - {label: "Photo (Télécharger depuis l'ordi/téléphone)", name: "img", widget: "image"}
              - {label: "Lien Google Maps ou Site Web", name: "link", widget: "string"}
              
              # L'astuce est ici : on crée un seul bloc visible appelé "Informations"
              # Mais en arrière-plan, le CMS va directement mapper les champs correctement.
              - label: "✍️ TEXTES EN FRANÇAIS"
                name: "fr"
                widget: "object"
                fields:
                  - {label: "Nom du lieu", name: "t", widget: "string"}
                  - {label: "Description principale", name: "d", widget: "text"}
                  - {label: "Titre du badge vert(ex: Incontournable)", name: "bt", widget: "string", required: false}
                  - {label: "Texte de l'astuce verte (dans le badge)", name: "bd", widget: "text", required: false}

              # Ce bloc EN n'a plus de champs visibles (fields: []), mais il existe pour ne pas faire planter le site.
              # Pour que les données se dupliquent automatiquement, on va laisser le CMS initialiser un objet vide
              # ou vous pourrez modifier le script du site principal pour qu'il lise "fr" par défaut si "en" est absent.
              - label: "🇬🇧 Traduction automatique (ne rien mettre)"
                name: "en"
                widget: "object"
                required: false
                fields:
                  - {name: "t", widget: "hidden", default: ""}
                  - {name: "d", widget: "hidden", default: ""}