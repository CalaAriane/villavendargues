<body>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script>
    // Attend que le CMS soit initialisé pour désactiver l'aperçu moche
    CMS.registerPreviewTemplate("donnees", () => null);
    CMS.registerPreviewTemplate("adresses", () => null);
    
    // Force visuelle pour cacher la colonne de droite au cas où
    const style = document.createElement('style');
    style.innerHTML = `
      .nc-previewPane-previewPane { display: none !important; } 
      .nc-entryEditor-controlPane { width: 100% !important; max-width: 100% !important; }
    `;
    document.head.appendChild(style);
  </script>
