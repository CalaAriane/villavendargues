<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Administration - Villa Vendargues</title>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <style>
    /* Supprime définitivement la colonne d'aperçu de droite et met le formulaire à 100% de largeur */
    div[class^="nc-previewPane-previewPane"], 
    .nc-previewPane-previewPane,
    iframe { 
      display: none !important; 
      width: 0px !important;
    }
    div[class^="nc-entryEditor-controlPane"],
    .nc-entryEditor-controlPane { 
      width: 100% !important; 
      max-width: 100% !important; 
    }
  </style>
</head>
<body>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script>
    // Désactive les templates d'aperçu pour cette collection
    CMS.registerPreviewTemplate("donnees", () => null);
    CMS.registerPreviewTemplate("adresses", () => null);
  </script>
</body>
</html>
